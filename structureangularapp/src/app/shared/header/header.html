<header class="top-header">
  <div class="header-left">
    <!-- TOGGLE BUTTON (Hamburger) -->
    <button class="header-toggle-btn" (click)="toggleSidebar()" title="Toggle Menu">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
        <line x1="3" y1="12" x2="21" y2="12"></line>
        <line x1="3" y1="6" x2="21" y2="6"></line>
        <line x1="3" y1="18" x2="21" y2="18"></line>
      </svg>
    </button>

    <svg class="header-logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 250">
      <path fill="#DD0031" d="M125 30L31.9 63.2l14.2 123.1L125 230l78.9-43.7 14.2-123.1z" />
      <path fill="#C3002F" d="M125 30v22.2-.1V230l78.9-43.7 14.2-123.1L125 30z" />
      <path fill="#FFFFFF"
        d="M125 52.1L66.8 182.6h21.7l11.7-29.2h49.4l11.7 29.2H183L125 52.1zm17 83.3h-34l17-40.9 17 40.9z" />
    </svg>

    <div class="brand-box">
      <h2 class="brand-name">Enterprise User</h2>
      <small class="brand-subtitle">Management Portal</small>
    </div>
  </div>

  <!-- RIGHT -->
  <div class="header-right">
    <span class="welcome-user">
      Welcome {{ loggedInUser }}
    </span>

    <div class="profile-dropdown-container">
      <!-- Avatar Button -->
      <button class="avatar-btn" (click)="toggleProfileMenu()">
        {{ loggedInUser.charAt(0) || 'U' | uppercase }}
      </button>

      <!-- Dropdown Menu -->
      <div class="profile-dropdown-menu" *ngIf="isProfileMenuOpen">
        <div class="dropdown-header">
          <div class="dropdown-avatar">{{ loggedInUser.charAt(0) || 'U' | uppercase }}</div>
          <span class="dropdown-username">{{ loggedInUser || 'User' }}</span>
        </div>

        <div class="dropdown-divider"></div>

        <a class="dropdown-item" routerLink="/profile" (click)="isProfileMenuOpen = false">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
            <circle cx="12" cy="7" r="4"></circle>
          </svg>
          Profile
        </a>

        <a class="dropdown-item logout-item" (click)="logout()">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
            <polyline points="16 17 21 12 16 7"></polyline>
            <line x1="21" y1="12" x2="9" y2="12"></line>
          </svg>
          Logout
        </a>
      </div>
    </div>
  </div>
</header>
