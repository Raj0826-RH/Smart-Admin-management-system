<div class="login-viewport">
  <div class="blob shape-1"></div>
  <div class="blob shape-2"></div>
  <div class="blob shape-3"></div>
  <div class="bg-overlay"></div>

  <div class="otp-card position-relative" style="z-index: 10;">
    <div class="form-wrapper w-100">
      <h3 class="text-center mb-2 fw-bold" style="color: #1e293b;">Reset Password</h3>
      <p class="text-center text-muted mb-4 small">Enter your email address to receive a password reset link.</p>

      <form [formGroup]="forgotForm" (ngSubmit)="submitReset()">
        <!-- EMAIL -->
        <div class="form-floating mb-4">
          <input type="email" class="form-control" id="floatingEmail" placeholder="name@example.com" formControlName="email">
          <label for="floatingEmail" class="text-muted">Email address</label>
          <small class="text-danger ps-2 mt-1 d-inline-block" *ngIf="forgotForm.get('email')?.touched && forgotForm.get('email')?.invalid">
            Please enter a valid email address
          </small>
        </div>

        <!-- BUTTON -->
        <button class="btn btn-modern w-100" [disabled]="loading">
          <span *ngIf="loading" class="spinner-container">
            Sending...
            <div class="spinner"></div>
          </span>
          <span *ngIf="!loading">Send Reset Link</span>
        </button>
      </form>

      <p class="text-center mt-4 mb-0 small text-muted">
        Remember your password?
        <a routerLink="/login" class="fw-bold text-decoration-none signature-link">Back to Login</a>
      </p>
    </div>
  </div>
</div>
