<div class="dashboard-container">
  <header class="dashboard-header">
    <h1>System Overview</h1>
    <p>Real-time analytics for users and active campaigns</p>
  </header>

  <!-- Stat Cards -->
  <div class="stats-grid">
    <div class="stat-card blue">
      <div class="stat-icon">👥</div>
      <div class="stat-info">
        <span class="stat-label">Total Users</span>
        <span class="stat-value">{{totalUsers}}</span>
      </div>
    </div>
    <div class="stat-card teal">
      <div class="stat-icon">✅</div>
      <div class="stat-info">
        <span class="stat-label">Active Users</span>
        <span class="stat-value">{{activeUsers}}</span>
      </div>
    </div>
    <div class="stat-card orange">
      <div class="stat-icon">📢</div>
      <div class="stat-info">
        <span class="stat-label">Total Campaigns</span>
        <span class="stat-value">{{totalCampaigns}}</span>
      </div>
    </div>
    <div class="stat-card green">
      <div class="stat-icon">🚀</div>
      <div class="stat-info">
        <span class="stat-label">Active Campaigns</span>
        <span class="stat-value">{{activeCampaigns}}</span>
      </div>
    </div>
  </div>

  <div class="charts-grid">
    <!-- User Chart -->
    <div class="chart-card">
      <div class="chart-header">
        <h3>User Distribution</h3>
      </div>
      <div class="chart-body">
        <highcharts-chart
          *ngIf="chartOptions"
          [options]="chartOptions"
          style="width: 100%; height: 350px; display: block;">
        </highcharts-chart>
        <div *ngIf="!chartOptions" class="loading-state">
          <div class="spinner"></div>
          <span>Syncing User Data...</span>
        </div>
      </div>
    </div>

    <!-- Campaign Chart -->
    <div class="chart-card">
      <div class="chart-header">
        <h3>Campaign Performance</h3>
      </div>
      <div class="chart-body">
        <highcharts-chart
          *ngIf="campaignChartOptions"
          [options]="campaignChartOptions"
          style="width: 100%; height: 350px; display: block;">
        </highcharts-chart>
        <div *ngIf="!campaignChartOptions" class="loading-state">
          <div class="spinner"></div>
          <span>Syncing Campaign Data...</span>
        </div>
      </div>
    </div>
  </div>
</div>
